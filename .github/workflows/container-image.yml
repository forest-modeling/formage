name: Formage Container Image CI

on:
  push:
    branches: [ "main","dev" ]
    tags: 'v.*.*'

jobs:

  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required for pushing to GHCR
    
    strategy:
      matrix:
        python_version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Uses the GitHub username
          password: ${{ secrets.GITHUB_TOKEN }} # Uses the auto-generated GITHUB_TOKEN secret

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-py${{ matrix.python_version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Build from the current directory where the Dockerfile is located
          file: formage.containerfile
          #--tag formage:$(date +%s)
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_VER=${{ matrix.python_version }}